name: Build

on: [push, pull_request]

permissions:
    contents: read

jobs:
    test:
        name: Rust test & lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt
            - name: Cache cargo artifacts
              uses: Swatinem/rust-cache@v2
            - name: Check formatting
              run: cargo fmt --all -- --check
            - name: Clippy
              run: cargo clippy --all-targets --locked -- -D warnings
            - name: Run tests
              run: cargo test --locked --all-targets

    docker:
        name: Build Docker image
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: docker/setup-qemu-action@v3
            - uses: docker/setup-buildx-action@v4
            - name: Build action image
              run: make docker-build
              env:
                  PLATFORM: linux/amd64
                  ACTION: load
                  PROGRESS_MODE: plain
                  IMAGE_TAG: action-pull-request-merge:ci

            # ---- Smoke tests on the freshly-built image ------------------
            # The image is FROM scratch (no shell), so we invoke the binary
            # via `docker run` and only check exit code + stdout. No network
            # calls are needed: the actor-mismatch path short-circuits
            # before any API request.
            - name: Smoke test — missing input fails with exit 1
              run: |
                  set -euo pipefail
                  output=$(docker run --rm action-pull-request-merge:ci 2>&1 && echo __UNEXPECTED_SUCCESS__ || true)
                  echo "$output"
                  echo "$output" | grep -q "Input required and not supplied: github-token"
                  ! echo "$output" | grep -q "__UNEXPECTED_SUCCESS__"

            - name: Smoke test — actor mismatch skips cleanly with exit 0
              run: |
                  set -euo pipefail
                  output=$(docker run --rm \
                      -e "INPUT_GITHUB-TOKEN=dummy" \
                      -e "INPUT_NUMBER=1" \
                      -e "INPUT_ALLOWED-USERNAMES-REGEX=^nobody$" \
                      -e "GITHUB_REPOSITORY=octo/widget" \
                      -e "GITHUB_ACTOR=alice" \
                      action-pull-request-merge:ci 2>&1)
                  echo "$output"
                  echo "$output" | grep -q "Ignored, the username does not match"
